# Run: certbot --nginx -d yourdomain.com
# Certbot will auto-fill the SSL section below

server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.com;

    # Certbot fills these in automatically
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # React dashboard — root
    location / {
        proxy_pass http://localhost:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # FastAPI backend
    location /api/ {
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location /metrics {
        proxy_pass http://localhost:8001/metrics;
        # Restrict to internal only
        allow 127.0.0.1;
        deny all;
    }

    location /docs {
        proxy_pass http://localhost:8001/docs;
    }

    location /openapi.json {
        proxy_pass http://localhost:8001/openapi.json;
    }

    # Grafana at /grafana subdirectory
    location /grafana/ {
        proxy_pass http://localhost:3001/;
        proxy_set_header Host $host;
    }

    # Prometheus — internal only
    location /prometheus/ {
        proxy_pass http://localhost:9090/;
        allow 127.0.0.1;
        deny all;
    }
}
